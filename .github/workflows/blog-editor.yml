name: Blog Editor

on:
  schedule:
    - cron: '0 9 * * 1'      # Mon 09:00 UTC — draft up to BATCH_SIZE topics
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Topics to draft in one run (default: 3)'
        required: false
        default: '3'

permissions:
  contents: write
  issues: write

jobs:
  draft:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic pyyaml python-slugify

      - name: Run blog editor
        run: python scripts/blog_editor.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY1 }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '3' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push drafts
        run: |
          git config user.name "Blog Editor Bot"
          git config user.email "jelissei.levin@gmail.com"
          git add src/content/blog/ public/images/blog/ BLOG_TOPIC_BACKLOG.md docs/fact-audits/
          git diff --cached --quiet && echo "Nothing to commit, skipping." || (
            git commit -m "blog: draft ${{ env.DRAFTED_IDS }}" &&
            git pull --rebase origin master &&
            git push
          )
