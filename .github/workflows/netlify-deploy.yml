name: Netlify Deploy

# Triggered by every push to master (publisher commits, manual fixes, etc.)
# Builds on GitHub Actions (free) and uploads pre-built files to Netlify CDN.
# Does NOT use Netlify's build servers — bypasses the credit limit entirely.

on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN_V }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
